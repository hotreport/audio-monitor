name: 每日价格核查

on:
  schedule:
    - cron: "0 1 * * *"  # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:       # 手动触发

jobs:
  price-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run price checker
        run: python github_price_checker.py

      - name: Commit & Push
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@hotreport.github.io"
          git add speaker-monitor.html
          git diff --cached --quiet || (git commit -m "auto: daily price update" && git push)
