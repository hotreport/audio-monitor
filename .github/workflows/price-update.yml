name: 每日价格快照

on:
  schedule:
    - cron: "0 1 * * *"  # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:       # 手动触发

jobs:
  price-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run price snapshot
        run: python github_price_checker.py

      - name: Commit & Push
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@hotreport.github.io"
          git add speaker-monitor.html price_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: daily price snapshot (JD deferred to WorkBuddy)"
            git push
          fi
